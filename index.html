<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aja baja!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(130% 90% at 50% -10%, #7a4258 0%, #2b2118 60%);
    color: #fff; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px calc(20px + env(safe-area-inset-left)) calc(28px + env(safe-area-inset-bottom));
    text-align: center; overflow-x: hidden;
  }
  .emoji { font-size: clamp(3rem, 14vw, 5rem); animation: wag 1.1s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(-12deg); } 50% { transform: rotate(12deg); } }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: clamp(2.2rem, 9vw, 4rem); line-height: 1.02;
    margin: .25em 0 .15em; color: #f4d27a;
    text-shadow: 0 3px 18px rgba(0,0,0,.4);
  }
  .sub { font-size: clamp(1rem, 4vw, 1.25rem); color: #f0e3d4; max-width: 26ch; margin: 0 auto 26px; font-weight: 500; }
  .frame {
    width: min(92vw, 640px); aspect-ratio: 16/9;
    border-radius: 18px; overflow: hidden;
    box-shadow: 0 18px 50px rgba(0,0,0,.45); border: 2px solid rgba(244,210,122,.4);
    background: #000;
  }
  .frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  .sound {
    margin-top: 20px; border: 1.5px solid rgba(255,255,255,.35); background: rgba(255,255,255,.08);
    color: #fff; font-family: 'Inter'; font-weight: 600; font-size: .95rem;
    padding: 11px 22px; border-radius: 999px; cursor: pointer; transition: background .2s;
  }
  .sound:active { background: rgba(255,255,255,.2); }
  .foot { margin-top: 22px; font-size: .82rem; color: #c9b6a4; }
</style>
</head>
<body>
  <div class="emoji">&#x1F648;</div>
  <h1>Aja baja, inte tjuvkika!</h1>
  <p class="sub">H&auml;r finns inget att se &auml;n &mdash; t&aring;lamod, det blir v&auml;rt det. &#x1F609;</p>
  <div class="frame">
    <iframe id="yt"
      src="https://www.youtube-nocookie.com/embed/1GiPcP30cFc?autoplay=1&mute=1&loop=1&playlist=1GiPcP30cFc&controls=0&playsinline=1&modestbranding=1&rel=0"
      allow="autoplay; encrypted-media" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
  <button class="sound" onclick="unmute()">&#x1F50A; Klicka f&ouml;r ljud</button>
  <p class="foot">&hearts; Vi ses p&aring; festen</p>
<script>
  function unmute() {
    const f = document.getElementById('yt');
    f.src = "https://www.youtube-nocookie.com/embed/1GiPcP30cFc?autoplay=1&mute=0&loop=1&playlist=1GiPcP30cFc&controls=1&playsinline=1&modestbranding=1&rel=0";
  }
</script>
</body>
</html>
